name = "custodian-bot"
main = "src/index.js"
compatibility_date = "2024-04-26"
compatibility_flags = ["nodejs_compat"]

# Declare required secrets — wrangler deploy will fail if any are missing.
# Set them with:
#   npx wrangler secret put DISCORD_BOT_TOKEN
#   npx wrangler secret put CLIENT_ID
#   npx wrangler secret put PUBLIC_KEY
[secrets]
required = ["DISCORD_BOT_TOKEN", "CLIENT_ID", "PUBLIC_KEY"]

# Cloudflare D1 database binding (100 % free tier: 5 GB, 5 M reads, 100 k writes / day)
# Replace database_id with the UUID from:  npx wrangler d1 create custodian_db
[[d1_databases]]
binding = "DB"
database_name = "custodian_db"
database_id = "7fef2289-37c2-42ca-be3a-5c0d87b11a12"

# Cron trigger — fires every minute to process reminders & recurring cleanups.
# 1 440 invocations / day — well within the free tier (100 k / day).
[triggers]
crons = ["* * * * *"]
